<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Database Records</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>Database Records</h1>

    <table>

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Status</th>
            <th>Date & Time</th>
            <th>Action</th>
        </tr>

        {% for row in records %}

        <tr>

            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[4] }}</td>
            <td>{{ row[5] }}</td>

            <td>

                <a href="/delete/{{ row[0] }}"
                   class="delete-btn"
                   onclick="return confirm('Are you sure you want to delete this record?');">

                    Delete

                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

    <br><br>

    <a href="/" class="btn">
        ⬅ Back to Home
    </a>

</div>

</body>

</html>
